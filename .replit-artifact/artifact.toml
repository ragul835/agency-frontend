kind = "web"
previewPath = "/"
title = "Digital Engineering Agency"
version = "1.0.0"
id = "artifacts/agency-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19242

[services.development]
run = "pnpm --filter @workspace/agency-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agency-site", "run", "build" ]
publicDir = "artifacts/agency-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19242"
BASE_PATH = "/"
